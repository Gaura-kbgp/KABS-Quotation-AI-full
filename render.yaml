# Single-Service Docker Blueprint for KABS Quotation AI
# This file deploys both frontend and backend in one shot using a unified Docker image.

services:
  - type: web
    name: kabs-quotation-fullstack
    env: docker
    plan: starter # Starter or better for build memory
    envVars:
      # --- Backend Settings ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      
      # --- Frontend Settings ---
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: BACKEND_URL
        value: http://localhost:8000
      - key: NEXT_PUBLIC_BACKEND_URL 
        value: http://localhost:8000

